{% extends "base.html" %}

{% block content %}
<div class="glass-card large">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
        <div>
            <h2 style="margin-bottom: 0;">Dashboard</h2>
            <p style="margin-bottom: 0; font-size: 0.9rem;">Welcome back, admin.</p>
        </div>
    </div>

    {% if message %}
        <div class="success-msg" style="display: block;">
            {{ message }}
        </div>
    {% endif %}

    <div class="stat-box">
        <span>Hot Wallet Balance</span>
        <span class="stat-val">450.2 BTC</span>
    </div>

    <h3 class="section-title">Quick Withdrawal</h3>
    <form action="{{ url_for('withdraw') }}" method="POST">
        <div style="display: flex; gap: 1rem;">
            <div class="input-group" style="flex: 2; margin-bottom: 0;">
                <label>Recipient Address</label>
                <input type="text" name="address" placeholder="bc1q..." required>
            </div>
            <div class="input-group" style="flex: 1; margin-bottom: 0;">
                <label>Amount (BTC)</label>
                <input type="number" step="0.0001" name="amount" placeholder="0.00" required>
            </div>
        </div>
        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-danger">Initiate Transfer</button>
        </div>
    </form>
</div>
{% endblock %}
